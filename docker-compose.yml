version: '3.8'

services:
  dev:
    image: oven/bun:alpine
    container_name: rats-site-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - NODE_ENV=development
      - PORT=3000
    command: bun run dev
    # Add a pseudo-tty so the process doesn't exit immediately if command is overridden
    tty: true 
