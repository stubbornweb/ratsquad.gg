# compose.yml — Base configuration (shared between dev and prod)
# Dev: docker compose up (auto-merges compose.override.yml)
# Prod: docker compose -f compose.yml -f compose.production.yml up -d

name: ${COMPOSE_PROJECT_NAME:-rats-site}

services:
  app:
    build:
      context: .
      target: production
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
