# compose.production.yml — Production hardening
# Usage: docker compose -f compose.yml -f compose.production.yml up -d
# Single service (Next.js standalone) — no database or backend services needed

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

x-security: &default-security
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  app:
    <<: *default-security
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 100
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frontend
