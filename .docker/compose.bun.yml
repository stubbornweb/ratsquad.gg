# compose.bun.yml — Standalone Bun dev environment
# Usage: make bun-dev OR docker compose -f .docker/compose.bun.yml up

name: rats-site

services:
  app:
    image: oven/bun
    container_name: rats-site-dev
    ports:
      - "3000:3000"
    volumes:
      - ../:/app
    working_dir: /app
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WATCHPACK_POLLING=true
    command: sh -c "bun install && bun run dev"
    tty: true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
